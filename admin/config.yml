# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: naveen489/toponepercentile
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/16b926c8-8d41-47f1-b5ce-72d521c3be24/pkce
  auth_token_endpoint: /sites/16b926c8-8d41-47f1-b5ce-72d521c3be24/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://toponepercentile.com

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "contact"
    label: "Contact Info"
    files:
      - file: "content/contact.json"
        label: "Contact Info"
        name: "contact"
        format: "json"
        fields:
          - {label: "Address", name: "address", widget: "text"}
          - {label: "Phone Number", name: "phone", widget: "string"}
          - {label: "WhatsApp Number (digits only with country code)", name: "whatsapp", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Working Hours", name: "working_hours", widget: "string"}
          - {label: "Google Maps Embed URL", name: "map_url", widget: "string", required: false}

  - name: "homepage"
    label: "Homepage"
    files:
      - file: "content/homepage.json"
        label: "Homepage Settings"
        name: "homepage"
        format: "json"
        fields:
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Subtitle", name: "subtitle", widget: "text"}
              - {label: "CTA Button Text", name: "cta_text", widget: "string"}
              - {label: "CTA Button URL", name: "cta_url", widget: "string"}
          - label: "Statistics"
            name: "stats"
            widget: "list"
            fields:
              - {label: "Value", name: "value", widget: "string"}
              - {label: "Label", name: "label", widget: "string"}
          - label: "Why Choose Us Cards"
            name: "why_choose_us"
            widget: "list"
            fields:
              - {label: "Icon (Emoji)", name: "icon", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}

  - name: "about"
    label: "About Section"
    files:
      - file: "content/about.json"
        label: "About Settings"
        name: "about"
        format: "json"
        fields:
          - {label: "Heading", name: "heading", widget: "string"}
          - {label: "Description", name: "description", widget: "text"}
          - {label: "Mission", name: "mission", widget: "text"}
          - {label: "Vision", name: "vision", widget: "text"}

  - name: "faculty"
    label: "Faculty Profile"
    files:
      - file: "content/faculty.json"
        label: "Faculty Details"
        name: "faculty"
        format: "json"
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Designation", name: "designation", widget: "string"}
          - {label: "Qualification", name: "qualification", widget: "string"}
          - {label: "Experience", name: "experience", widget: "string"}
          - {label: "Photo", name: "photo", widget: "image", required: false}
          - label: "Expertise Tags"
            name: "expertise"
            widget: "list"
            field: {label: "Tag", name: "tag", widget: "string"}
          - {label: "Biography", name: "biography", widget: "text"}
          - {label: "Teaching Philosophy", name: "philosophy", widget: "text"}
          - label: "Achievements"
            name: "achievements"
            widget: "list"
            field: {label: "Achievement", name: "item", widget: "string"}

  - name: "programs"
    label: "Programs"
    files:
      - file: "content/programs.json"
        label: "Programs List"
        name: "programs"
        format: "json"
        fields:
          - label: "Programs"
            name: "programs"
            widget: "list"
            fields:
              - {label: "ID (lowercase, no spaces)", name: "id", widget: "string"}
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Icon (Emoji)", name: "icon", widget: "string"}
              - {label: "Description", name: "description", widget: "text"}
              - {label: "Eligibility", name: "eligibility", widget: "text"}
              - label: "Features"
                name: "features"
                widget: "list"
                fields:
                  - {label: "Icon (Emoji)", name: "icon", widget: "string"}
                  - {label: "Title", name: "title", widget: "string"}
              - {label: "CTA Button Text", name: "cta_text", widget: "string", default: "Enquire Now"}

  - name: "testimonials"
    label: "Testimonials"
    files:
      - file: "content/testimonials.json"
        label: "Testimonials List"
        name: "testimonials"
        format: "json"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            fields:
              - {label: "Student Name", name: "name", widget: "string"}
              - {label: "Exam / Batch", name: "exam", widget: "string"}
              - {label: "Year", name: "year", widget: "string"}
              - {label: "Rating (1–5)", name: "rating", widget: "number", value_type: "int", min: 1, max: 5, default: 5}
              - {label: "Review", name: "review", widget: "text"}

  - name: "faq"
    label: "FAQ"
    files:
      - file: "content/faq.json"
        label: "FAQ List"
        name: "faqs"
        format: "json"
        fields:
          - label: "FAQs"
            name: "faqs"
            widget: "list"
            fields:
              - {label: "Question", name: "question", widget: "string"}
              - {label: "Answer", name: "answer", widget: "text"}
